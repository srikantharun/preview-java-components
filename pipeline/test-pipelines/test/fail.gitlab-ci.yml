spec:
  inputs:
    java_version:
      type: string
      description: Major JDK version to use (LTS only)
---

workflow:
  name: "java/test (failing tests, JDK$[[ inputs.java_version ]])"
  rules:
    - when: always

stages:
  - code-analysis
  - install
  - build
  - unit-test
  - integration-test
  - assert

include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/test@$CI_COMMIT_SHA
    inputs:
      java_version: "$[[ inputs.java_version | expand_vars ]]"
      component_context_dir: "pipeline/test-pipelines/test/fixtures/fail"
      run_integration_tests: false

# Assertions - runs after unit test fails (expected behavior)
assert::fail:
  stage: assert
  when: on_failure
  image: nexus.nonprod.dwpcloud.uk/docker/chainguard/curl:latest-dev
  tags:
    - dwp-aws-x86-linux-l
  script: pipeline/test-pipelines/test/assert.fail.sh "pipeline/test-pipelines/test/fixtures/fail"
