spec:
  component: [sha, version]
  inputs:
    java_version:
      default: "25"
      description: "Java version"
      options: ["21", "25"]
      type: string
    ruleset:
      default: recommended
      description: "Linting ruleset to apply. 'recommended' enforces component rules. 'custom' uses project config."
      options: [recommended, custom]
      type: string
    run_pmd:
      default: true
      description: "Run PMD static analysis"
      type: boolean
    run_hadolint:
      default: true
      description: "Run Hadolint on Dockerfiles"
      type: boolean
    run_shellcheck:
      default: true
      description: "Run ShellCheck on shell scripts"
      type: boolean
    run_openapi_validation:
      default: false
      description: "Run OpenAPI spec validation"
      type: boolean
    # Standard Component inputs
    component_context_dir:
      default: "./"
      description: "Working directory in which this Component will execute"
      regex: ^([a-z.][a-zA-Z0-9-_/]+)?$
      type: string
    job_name_prefix:
      default: ""
      description: "Prefix for all component jobs"
      regex: ^([a-z][a-z0-9-]+::)*$
      type: string
    job_stage:
      default: "code-analysis"
      description: "Pipeline stage in which jobs are run"
      type: string
---
include:
  - local: /templates/shared/common.yml
    inputs:
      component_context_dir: "$[[ inputs.component_context_dir ]]"
      job_name_prefix: "$[[ inputs.job_name_prefix ]]"
      job_stage: "$[[ inputs.job_stage ]]"
      _component_sha: "$[[ component.sha ]]"
      _component_version: "$[[ component.version ]]"
      java_version: "$[[ inputs.java_version ]]"

# Checkstyle linting
"$[[ inputs.job_name_prefix ]]java::lint::checkstyle":
  artifacts:
    expire_in: 1 week
    paths:
      - $[[ inputs.component_context_dir ]]/target/checkstyle-result.xml
      - $[[ inputs.component_context_dir ]]/gl-code-quality-checkstyle.json
    reports:
      codequality: $[[ inputs.component_context_dir ]]/gl-code-quality-checkstyle.json
    when: always
  allow_failure:
    exit_codes: [211]
  cache:
    key: "${CI_JOB_NAME}-$[[ inputs.java_version ]]"
    paths:
      - $[[ inputs.component_context_dir ]]/.m2-local/
    when: always
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs: []
  script: |
    /component/lint/jobs/checkstyle.sh \
      --ruleset="$[[ inputs.ruleset ]]"

# SpotBugs linting
"$[[ inputs.job_name_prefix ]]java::lint::spotbugs":
  artifacts:
    expire_in: 1 week
    paths:
      - $[[ inputs.component_context_dir ]]/target/spotbugsXml.xml
      - $[[ inputs.component_context_dir ]]/gl-code-quality-spotbugs.json
    reports:
      codequality: $[[ inputs.component_context_dir ]]/gl-code-quality-spotbugs.json
    when: always
  allow_failure:
    exit_codes: [212]
  cache:
    key: "${CI_JOB_NAME}-$[[ inputs.java_version ]]"
    paths:
      - $[[ inputs.component_context_dir ]]/.m2-local/
    when: always
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs: []
  script: /component/lint/jobs/spotbugs.sh --ruleset "$[[ inputs.ruleset ]]"

# PMD linting (conditional)
"$[[ inputs.job_name_prefix ]]java::lint::pmd":
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs: []
  rules:
    - if: '"$[[ inputs.run_pmd ]]" == "true"'
  script: |
    mvn pmd:check -Dmaven.repo.local=.m2-local

# Hadolint (conditional)
"$[[ inputs.job_name_prefix ]]java::lint::hadolint":
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs: []
  rules:
    - if: '"$[[ inputs.run_hadolint ]]" == "true"'
  script: |
    hadolint Dockerfile

# ShellCheck (conditional)
"$[[ inputs.job_name_prefix ]]java::lint::shellcheck":
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs: []
  rules:
    - if: '"$[[ inputs.run_shellcheck ]]" == "true"'
  script: |
    find . -name "*.sh" -exec shellcheck {} +

# OpenAPI validation (conditional)
"$[[ inputs.job_name_prefix ]]java::lint::openapi":
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs: []
  rules:
    - if: '"$[[ inputs.run_openapi_validation ]]" == "true"'
  script: |
    /component/lint/jobs/openapi-validation.sh
