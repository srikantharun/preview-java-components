spec:
  component: [sha, version]
  inputs:
    java_version:
      default: "25"
      description: "Java version"
      options: ["21", "25"]
      type: string
    # Prescribed test types with boolean toggles
    run_integration_tests:
      default: true
      description: "Run integration tests (mvn verify). Prescribed: ON"
      type: boolean
    run_wiremock:
      default: false
      description: "Run Wiremock API integration tests"
      type: boolean
    run_mutation_tests:
      default: true
      description: "Run PiTest mutation testing. Prescribed: ON for quality assurance"
      type: boolean
    # Standard Component inputs
    component_context_dir:
      default: "./"
      description: "Working directory in which this Component will execute"
      regex: ^([a-z.][a-zA-Z0-9-_/]+)?$
      type: string
    job_name_prefix:
      default: ""
      description: "Prefix for all component jobs"
      regex: ^([a-z][a-z0-9-]+::)*$
      type: string
---
# =============================================================================
# java/test - Runs all test types
#
# Prescribed behavior (best practices ON by default):
#   - Unit tests: ALWAYS run (non-negotiable quality gate)
#   - Integration tests: ON by default (best practice)
#   - Mutation tests: ON by default (catches bugs unit tests miss)
#   - Wiremock: OFF by default (opt-in for API projects)
#
# Stages (prescribed):
#   - unit-test: Unit tests
#   - integration-test: Integration tests, Wiremock
#   - security-static-analysis: Mutation tests
# =============================================================================

include:
  - local: /templates/shared/common.yml
    inputs:
      component_context_dir: "$[[ inputs.component_context_dir ]]"
      job_name_prefix: "$[[ inputs.job_name_prefix ]]"
      job_stage: "unit-test"
      _component_sha: "$[[ component.sha ]]"
      _component_version: "$[[ component.version ]]"
      java_version: "$[[ inputs.java_version ]]"
  # Wiremock function (conditional usage)
  - project: dwp/engineering/pipeline-solutions/gitlab/functions
    ref: 7.1.6
    file:
      - functions/wiremock-mr.gitlab-ci.yml

variables:
  DISABLE_WIREMOCK: "$[[ inputs.run_wiremock | then: 'false', else: 'true' ]]"

# =============================================================================
# Unit Tests (ALWAYS runs - non-negotiable)
# =============================================================================

"$[[ inputs.job_name_prefix ]]java::test::unit":
  artifacts:
    expire_in: 1 week
    paths:
      - $[[ inputs.component_context_dir ]]/target/surefire-reports/
      - $[[ inputs.component_context_dir ]]/target/site/jacoco/
    reports:
      junit: $[[ inputs.component_context_dir ]]/target/surefire-reports/*.xml
      coverage_report:
        coverage_format: jacoco
        path: $[[ inputs.component_context_dir ]]/target/site/jacoco/jacoco.xml
    when: always
  cache:
    key: "${CI_JOB_NAME}-$[[ inputs.java_version ]]"
    paths:
      - $[[ inputs.component_context_dir ]]/.m2-local/
    when: always
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  stage: unit-test
  script: /component/test/jobs/unit.sh

# =============================================================================
# Integration Tests (prescribed: ON by default)
# =============================================================================

"$[[ inputs.job_name_prefix ]]java::test::integration":
  artifacts:
    expire_in: 1 week
    paths:
      - $[[ inputs.component_context_dir ]]/target/failsafe-reports/
      - $[[ inputs.component_context_dir ]]/target/site/jacoco/
    reports:
      junit: $[[ inputs.component_context_dir ]]/target/failsafe-reports/*.xml
      coverage_report:
        coverage_format: jacoco
        path: $[[ inputs.component_context_dir ]]/target/site/jacoco/jacoco.xml
    when: always
  cache:
    key: "${CI_JOB_NAME}-$[[ inputs.java_version ]]"
    paths:
      - $[[ inputs.component_context_dir ]]/.m2-local/
    when: always
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs:
    - job: "$[[ inputs.job_name_prefix ]]java::build::package"
      optional: true
  rules:
    - if: '"$[[ inputs.run_integration_tests ]]" == "true"'
  stage: integration-test
  script: /component/test/jobs/integration.sh

# =============================================================================
# Wiremock API Tests (opt-in for API projects)
# =============================================================================

"$[[ inputs.job_name_prefix ]]java::test::wiremock":
  artifacts:
    expire_in: 1 week
    paths:
      - $[[ inputs.component_context_dir ]]/target/wiremock-reports/
      - $[[ inputs.component_context_dir ]]/target/site/jacoco/
    reports:
      coverage_report:
        coverage_format: jacoco
        path: $[[ inputs.component_context_dir ]]/target/site/jacoco/jacoco.xml
    when: always
  cache:
    key: "${CI_JOB_NAME}-$[[ inputs.java_version ]]"
    paths:
      - $[[ inputs.component_context_dir ]]/.m2-local/
    when: always
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs:
    - job: "$[[ inputs.job_name_prefix ]]java::build::package"
      optional: true
  rules:
    - if: '"$[[ inputs.run_wiremock ]]" == "true"'
  stage: integration-test
  script: /component/test/jobs/wiremock.sh

# =============================================================================
# Mutation Tests (prescribed: ON by default for quality)
# =============================================================================

"$[[ inputs.job_name_prefix ]]java::test::mutation":
  artifacts:
    expire_in: 1 week
    paths:
      - $[[ inputs.component_context_dir ]]/target/pit-reports/
    when: always
  cache:
    key: "${CI_JOB_NAME}-$[[ inputs.java_version ]]"
    paths:
      - $[[ inputs.component_context_dir ]]/.m2-local/
    when: always
  extends: ".$[[ inputs.job_name_prefix ]]java::common"
  needs:
    - job: "$[[ inputs.job_name_prefix ]]java::test::unit"
      optional: true
  rules:
    - if: '"$[[ inputs.run_mutation_tests ]]" == "true"'
  stage: security-static-analysis
  script: /component/test/jobs/mutation.sh
