apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: java-backend-service
  title: Create Java Backend Service
  description: |
    Scaffolds a new Java backend service with GitLab CI/CD pipeline using
    the java/app-pipeline component. Includes Maven project structure,
    Dockerfile, and pre-configured CI pipeline.
  tags:
    - java
    - maven
    - backend
    - gitlab-ci
    - recommended
spec:
  owner: group:devx-working-group
  type: service

  # =========================================================================
  # Form Parameters - What users fill in
  # =========================================================================
  parameters:
    - title: Service Information
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Service Name
          type: string
          description: Unique name for the service (lowercase, hyphens allowed)
          pattern: "^[a-z][a-z0-9-]*$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Brief description of what this service does
        owner:
          title: Owner
          type: string
          description: Team that owns this service
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

    - title: Java Configuration
      required:
        - java_version
        - group_id
        - artifact_id
      properties:
        java_version:
          title: Java Version
          type: string
          description: Java LTS version to use
          default: "25"
          enum:
            - "21"
            - "25"
          enumNames:
            - Java 21 (LTS)
            - Java 25 (Latest LTS)
        group_id:
          title: Maven Group ID
          type: string
          description: "e.g., uk.gov.dwp.yourteam"
          default: uk.gov.dwp
        artifact_id:
          title: Maven Artifact ID
          type: string
          description: Will default to service name if not specified

    - title: API Configuration
      properties:
        has_api:
          title: Exposes HTTP API?
          type: boolean
          description: Enable if your service exposes REST/HTTP endpoints
          default: true
        use_wiremock:
          title: Use Wiremock for API tests?
          type: boolean
          description: Enable Wiremock integration testing (requires API)
          default: true
          ui:widget: checkbox

    - title: Repository Location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - gitlab.com

  # =========================================================================
  # Steps - What happens after form submission
  # =========================================================================
  steps:
    # Step 1: Fetch and template the skeleton
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          java_version: ${{ parameters.java_version }}
          group_id: ${{ parameters.group_id }}
          artifact_id: ${{ parameters.artifact_id | default(parameters.name, true) }}
          has_api: ${{ parameters.has_api }}
          use_wiremock: ${{ parameters.use_wiremock }}

    # Step 2: Publish to GitLab
    - id: publish
      name: Publish to GitLab
      action: publish:gitlab
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: internal

    # Step 3: Register in Backstage catalog
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  # =========================================================================
  # Output - Links shown after scaffolding
  # =========================================================================
  output:
    links:
      - title: Open Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: View Pipeline
        url: ${{ steps['publish'].output.remoteUrl }}/-/pipelines
