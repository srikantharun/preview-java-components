apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: java-components
  title: Java CI/CD Components
  description: |
    A collection of GitLab CI/CD Components for building, testing, and deploying Java applications.
    Follows "convention over configuration" philosophy with prescriptive best practices.
  labels:
    tier: platform
  tags:
    - gitlab-ci
    - java
    - maven
    - components
    - cicd
  annotations:
    gitlab.com/project-slug: dwp/engineering/pipeline-solutions/gitlab/components/java
    backstage.io/techdocs-ref: dir:.
  links:
    - url: https://gitlab.com/dwp/engineering/pipeline-solutions/gitlab/components/java
      title: GitLab Repository
      icon: gitlab
    - url: https://dwpdigital.slack.com/archives/C025DK6HFPS
      title: Slack Support
      icon: chat
spec:
  type: library
  lifecycle: production
  owner: group:devx-working-group
  system: devx-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: java-build
  title: Java Build Component
  description: |
    Builds JAR files using Maven. Runs mvn package -DskipTests with prescribed stages.
  tags:
    - build
    - maven
    - jar
  annotations:
    gitlab.com/project-slug: dwp/engineering/pipeline-solutions/gitlab/components/java
  links:
    - url: https://gitlab.com/dwp/engineering/pipeline-solutions/gitlab/components/java/-/blob/main/docs/build/usage.md
      title: Documentation
      icon: docs
spec:
  type: ci-component
  lifecycle: production
  owner: group:devx-working-group
  system: devx-platform
  dependsOn:
    - component:java-components
